<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GearGap — Find Your Gear Gap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg-deep: oklch(0.16 0.012 60);
    --bg: oklch(0.19 0.012 60);
    --panel: oklch(0.225 0.014 65);
    --panel-2: oklch(0.26 0.015 65);
    --border: oklch(0.34 0.014 65);
    --border-soft: oklch(0.28 0.012 65);
    --text: oklch(0.94 0.012 80);
    --text-dim: oklch(0.72 0.014 75);
    --text-mute: oklch(0.55 0.012 70);
    --gold: oklch(0.80 0.135 78);
    --gold-deep: oklch(0.66 0.13 65);
    --gold-soft: oklch(0.45 0.08 70);
    --crimson: oklch(0.62 0.16 25);
    --jade: oklch(0.66 0.10 160);
    --steel: oklch(0.66 0.08 230);
    --violet: oklch(0.66 0.13 300);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Background atmospherics */
  .bg-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .bg-vignette {
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, oklch(0.30 0.04 75 / 0.45) 0%, transparent 60%),
      radial-gradient(ellipse 100% 80% at 50% 100%, oklch(0.14 0.01 60 / 0.6) 0%, transparent 50%);
  }
  .bg-grain {
    opacity: 0.08;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.5  0 0 0 0 0.3  0 0 0 1 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .bg-grid {
    background-image:
      linear-gradient(oklch(0.30 0.01 65 / 0.07) 1px, transparent 1px),
      linear-gradient(90deg, oklch(0.30 0.01 65 / 0.07) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse 70% 50% at 50% 35%, black 0%, transparent 75%);
  }
  .bg-sigil {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 80px;
    opacity: 0.06;
  }

  /* Layout shell */
  .shell {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* Nav */
  nav.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 0;
    border-bottom: 1px solid var(--border-soft);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 0.08em;
    color: var(--text);
    text-transform: uppercase;
  }
  .logo-mark {
    width: 32px;
    height: 32px;
    position: relative;
    flex-shrink: 0;
  }
  .logo-mark svg { display: block; }
  .logo-gap {
    color: var(--gold);
  }
  .nav-links {
    display: flex;
    gap: 32px;
    align-items: center;
  }
  .nav-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.15s;
  }
  .nav-links a:hover { color: var(--gold); }
  .nav-links a.active { color: var(--text); }
  .nav-cta {
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 2px;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.06em;
    background: var(--panel);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .nav-cta:hover {
    border-color: var(--gold-deep);
    color: var(--gold);
  }

  /* Hero */
  .hero {
    text-align: center;
    padding: 96px 0 56px;
    position: relative;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 28px;
    padding: 6px 14px;
    border: 1px solid oklch(0.66 0.13 65 / 0.4);
    background: oklch(0.66 0.13 65 / 0.06);
    border-radius: 2px;
  }
  .eyebrow .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  h1.title {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 76px;
    line-height: 1.05;
    letter-spacing: 0.01em;
    margin: 0 0 20px;
    color: var(--text);
    text-shadow: 0 2px 24px oklch(0.66 0.13 65 / 0.15);
  }
  h1.title .accent {
    color: var(--gold);
    font-style: italic;
    position: relative;
  }
  h1.title .accent::after {
    content: '';
    position: absolute;
    left: 6%;
    right: 6%;
    bottom: -6px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-deep), transparent);
  }
  .subtitle {
    font-size: 17px;
    color: var(--text-dim);
    max-width: 580px;
    margin: 0 auto 48px;
    line-height: 1.6;
  }
  .subtitle .em {
    color: var(--gold);
    font-weight: 500;
  }

  /* Search panel */
  .search-panel {
    max-width: 720px;
    margin: 0 auto;
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px;
    position: relative;
    box-shadow:
      0 0 0 1px oklch(0.66 0.13 65 / 0.06),
      0 30px 60px -20px oklch(0 0 0 / 0.5),
      inset 0 1px 0 oklch(1 0 0 / 0.04);
  }
  .search-panel::before, .search-panel::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    border: 1px solid var(--gold-deep);
  }
  .search-panel::before {
    top: -1px; left: -1px;
    border-right: none; border-bottom: none;
  }
  .search-panel::after {
    bottom: -1px; right: -1px;
    border-left: none; border-top: none;
  }
  .search-corner-tr, .search-corner-bl {
    position: absolute;
    width: 14px;
    height: 14px;
    border: 1px solid var(--gold-deep);
  }
  .search-corner-tr {
    top: -1px; right: -1px;
    border-left: none; border-bottom: none;
  }
  .search-corner-bl {
    bottom: -1px; left: -1px;
    border-right: none; border-top: none;
  }

  .search-form {
    display: grid;
    grid-template-columns: 1fr 220px auto;
    gap: 0;
    align-items: stretch;
    background: var(--bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .field {
    display: flex;
    flex-direction: column;
    padding: 14px 18px;
    border-right: 1px solid var(--border-soft);
    text-align: left;
    position: relative;
  }
  .field:last-child { border-right: none; }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .field input, .field select {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    padding: 0;
    outline: none;
    width: 100%;
  }
  .field input::placeholder { color: var(--text-mute); }
  .field select {
    appearance: none;
    cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1L5 5L9 1' stroke='%23c2a25b' stroke-width='1.5' fill='none'/></svg>");
    background-repeat: no-repeat;
    background-position: right 0 center;
    padding-right: 18px;
  }
  .field select option { background: var(--panel); color: var(--text); }
  .field:focus-within .field-label { color: var(--gold); }
  .field:focus-within {
    background: oklch(0.66 0.13 65 / 0.04);
  }

  .search-btn {
    background: linear-gradient(180deg, var(--gold) 0%, var(--gold-deep) 100%);
    color: oklch(0.16 0.02 60);
    border: none;
    padding: 0 32px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: filter 0.15s;
    position: relative;
  }
  .search-btn:hover { filter: brightness(1.1); }
  .search-btn:active { filter: brightness(0.95); }
  .search-btn svg { width: 14px; height: 14px; }

  /* Stats strip */
  .stat-strip {
    display: flex;
    justify-content: center;
    gap: 48px;
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid var(--border-soft);
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    text-transform: uppercase;
  }

  /* Recent section */
  .section {
    padding: 80px 0 100px;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .section-title {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .section-title h2 {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.05em;
    margin: 0;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .section-title .ornament {
    width: 24px;
    height: 1px;
    background: var(--gold-deep);
  }
  .section-link {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    text-decoration: none;
    transition: color 0.15s;
  }
  .section-link:hover { color: var(--gold); }

  .recent-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .char-card {
    background: linear-gradient(180deg, var(--panel) 0%, oklch(0.20 0.012 60) 100%);
    border: 1px solid var(--border-soft);
    padding: 18px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    overflow: hidden;
  }
  .char-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--class-color, var(--gold));
    opacity: 0.7;
  }
  .char-card:hover {
    border-color: oklch(0.66 0.13 65 / 0.5);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px -12px oklch(0 0 0 / 0.6);
  }
  .char-card:hover::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 100% at 50% 0%, oklch(0.66 0.13 65 / 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .char-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    padding-right: 64px;
  }
  .char-portrait {
    width: 44px;
    height: 44px;
    border-radius: 2px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--class-color, var(--gold));
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  .char-portrait::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--class-color, var(--gold)) 0%, transparent 60%);
    opacity: 0.18;
  }
  .char-info { min-width: 0; flex: 1; }
  .char-name {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.03em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .char-spec {
    font-size: 11px;
    color: var(--class-color, var(--text-dim));
    font-weight: 500;
    margin-top: 2px;
  }
  .char-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px dashed var(--border-soft);
  }
  .char-ilvl {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .char-ilvl .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-mute);
    display: block;
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 3px;
  }
  .char-server {
    text-align: right;
  }
  .char-server-name {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .char-server-ts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-mute);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  /* Gap badge on card */
  .char-gap {
    position: absolute;
    top: 16px;
    right: 14px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gap-color, var(--gold));
    background: oklch(0.18 0.01 60 / 0.7);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .char-gap .arrow {
    font-size: 10px;
    line-height: 1;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border-soft);
    padding: 24px 0 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-mute);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  footer .legal { color: var(--text-mute); }
  footer .links { display: flex; gap: 24px; }
  footer .links a { color: var(--text-mute); text-decoration: none; }
  footer .links a:hover { color: var(--gold); }

  /* Toast on submit */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--panel);
    border: 1px solid var(--gold-deep);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 2px;
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.25s;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast .spin {
    width: 12px; height: 12px;
    border: 2px solid var(--gold-deep);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 900px) {
    .recent-grid { grid-template-columns: repeat(2, 1fr); }
    h1.title { font-size: 52px; }
    .search-form { grid-template-columns: 1fr; }
    .field { border-right: none; border-bottom: 1px solid var(--border-soft); }
    .stat-strip { gap: 24px; }
  }
</style>
</head>
<body>

<!-- atmospheric layers -->
<div class="bg-layer bg-vignette"></div>
<div class="bg-layer bg-grid"></div>
<div class="bg-layer bg-sigil">
  <svg width="900" height="900" viewBox="0 0 900 900" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <circle cx="450" cy="450" r="380" stroke="#c2a25b" stroke-width="1"/>
    <circle cx="450" cy="450" r="300" stroke="#c2a25b" stroke-width="1" stroke-dasharray="2 8"/>
    <circle cx="450" cy="450" r="220" stroke="#c2a25b" stroke-width="1"/>
    <polygon points="450,180 690,580 210,580" stroke="#c2a25b" stroke-width="1" fill="none"/>
    <polygon points="450,720 210,320 690,320" stroke="#c2a25b" stroke-width="1" fill="none"/>
    <circle cx="450" cy="450" r="60" stroke="#c2a25b" stroke-width="1"/>
  </svg>
</div>
<div class="bg-layer bg-grain"></div>

<div id="root"></div>

<link rel="stylesheet" href="screens.css">
<link rel="stylesheet" href="states.css">
<link rel="stylesheet" href="transparency.css">
<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="transparency.jsx"></script>
<script type="text/babel" src="analysis.jsx"></script>
<script type="text/babel" src="recommendations.jsx"></script>
<script type="text/babel" src="states.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
